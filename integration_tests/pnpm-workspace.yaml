packages:
  - pkgs/*

catalog:
  '@eslint/js': ^10.0.1
  '@tsconfig/strictest': ^2.0.8
  '@types/node': ^26.0.0
  ava: ^8.0.1
  eslint: ^10.5.0
  eslint-config-prettier: ^10.1.8
  globals: ^17.5.0
  option-t: ^56.1.2
  prettier: ^3.8.4
  typescript: ^6.0.3
  undici: ^8.3.0

minimumReleaseAge: 8400 # 60min * 24 * 7. This should be matched with dependabot's cooldown setting.

trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 43200 # 60min * 24 * 30

# Mitigate an attack vector for a typical supply chain attack.
blockExoticSubdeps: true

strictDepBuilds: true
